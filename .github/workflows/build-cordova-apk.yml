name: Build Cordova APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

# Only the newest source revision may publish artifacts. This prevents an
# older, slower APK build from overwriting a newer site release.
concurrency:
  group: kicker-hax-release-master
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip apk]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cordova-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create google-services.json from secret
        working-directory: cordova-app
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_CONTENT" ]; then
            echo "$GOOGLE_SERVICES_JSON_CONTENT" > google-services.json
            echo "Successfully restored google-services.json from secret."
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret not set. Creating a dummy placeholder to prevent build crash."
            echo '{"project_info":{"project_number":"337598465170","firebase_url":"https://kickerhax-online-default-rtdb.firebaseio.com","project_id":"kickerhax-online","storage_bucket":"kickerhax-online.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:337598465170:android:ad813ed90d40d7ba20524b","android_client_info":{"package_name":"com.kickerhax.app"}},"oauth_client":[{"client_id":"337598465170-72lndpnrleeg1lu9v48fhk54jffmvesc.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"dummy_key_to_avoid_github_alert"}],"services":{"appinvite_service":{"other_platform_oauth_client":[{"client_id":"337598465170-72lndpnrleeg1lu9v48fhk54jffmvesc.apps.googleusercontent.com","client_type":3}]}}}],"configuration_version":"1"}' > google-services.json
          fi

      - name: Decode Keystore and Setup build.json
        working-directory: cordova-app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > kicker-hax.keystore
            echo '{"android":{"debug":{"keystore":"kicker-hax.keystore","storePassword":"kickerhaxpass","alias":"kickerhax","password":"kickerhaxpass","keystoreType":"","packageType":"apk"},"release":{"keystore":"kicker-hax.keystore","storePassword":"kickerhaxpass","alias":"kickerhax","password":"kickerhaxpass","keystoreType":"","packageType":"apk"}}}' > build.json
            echo "Successfully configured keystore and build.json."
          else
            echo "Warning: ANDROID_KEYSTORE_BASE64 secret not set. Compiling with default signing."
          fi

      - name: Build APK
        working-directory: cordova-app
        run: |
          npm ci
          node ../scripts/sync-native-version.mjs
          npx cordova platform add android@13.0.0
          if [ -f build.json ]; then
            npx cordova build android --release
            APK_PATH=$(find platforms/android/app/build/outputs/apk/release -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)
            test -n "$APK_PATH"
          else
            echo "Warning: release keystore not configured; building debug APK."
            npx cordova build android --debug
            APK_PATH=platforms/android/app/build/outputs/apk/debug/app-debug.apk
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Publish APK to docs
        run: |
          mkdir -p docs/downloads
          cp "cordova-app/${APK_PATH}" docs/downloads/kicker-hax.apk
          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -n 1)
          SHA1=$("${APKSIGNER}" verify --print-certs docs/downloads/kicker-hax.apk | sed -n -E 's/.*SHA-1 digest: *//p' | head -n 1)
          VERSION=$(sed -n -E 's/.*<widget[^>]*version="([^"]+)".*/\1/p' cordova-app/config.xml | head -n 1)
          printf "Kicker Hax APK\nVersion: %s\nBuilt: %s\nCommit: %s\nNative Google SHA-1: %s\n" "${VERSION}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${GITHUB_SHA}" "${SHA1}" > docs/downloads/kicker-hax-apk.txt

      - name: Build web release after APK
        run: |
          # Keep GitHub Pages on the previous stable bundle until the Android
          # artifact is ready. This build and the APK are committed together.
          VERSION=$(sed -n -E 's/.*<widget[^>]*version="([^"]+)".*/\1/p' cordova-app/config.xml | head -n 1)
          grep -q "Version: ${VERSION}" docs/downloads/kicker-hax-apk.txt
          test -s docs/downloads/kicker-hax.apk
          npm ci
          npm run client:build

      - name: Mostrar SHA-1 para login Google nativo
        run: |
          echo "Cadastre este SHA-1 no app Android com.kickerhax.app no Firebase:"
          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -n 1)
          "${APKSIGNER}" verify --print-certs docs/downloads/kicker-hax.apk | grep 'SHA-1 digest' || true

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "APK unchanged"
          else
            git commit -m "Kicker-Hax release: build - publicar site e app juntos [skip apk]"
            git push
          fi
